services:
  - type: web
    name: applypilot
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data/applypilot
      - key: DISABLE_BROWSER_AUTOFILL
        value: "1"
      - key: APP_PASSWORD
        sync: false
    disk:
      name: applypilot-data
      mountPath: /var/data
      sizeGB: 1
